<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0f172a"/>

  <!-- Hub-to-satellite edges -->
  <line x1="16" y1="16" x2="27"   y2="16"   stroke="#2a3a52" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="21.5" y2="6.5"  stroke="#2a3a52" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="10.5" y2="6.5"  stroke="#2a3a52" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="5"    y2="16"   stroke="#2a3a52" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="10.5" y2="25.5" stroke="#2a3a52" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="21.5" y2="25.5" stroke="#2a3a52" stroke-width="1.2"/>

  <!-- Cross edges (satellite ↔ satellite) -->
  <line x1="21.5" y1="6.5"  x2="10.5" y2="6.5"  stroke="#1e2d40" stroke-width="0.9"/>
  <line x1="10.5" y1="25.5" x2="21.5" y2="25.5" stroke="#1e2d40" stroke-width="0.9"/>

  <!-- Satellite nodes: 2× software (violet), 2× company (amber), 2× kernel (teal) -->
  <circle cx="27"   cy="16"   r="2.3" fill="#a78bfa"/>
  <circle cx="21.5" cy="6.5"  r="2.3" fill="#fbbf24"/>
  <circle cx="10.5" cy="6.5"  r="2.3" fill="#2dd4bf"/>
  <circle cx="5"    cy="16"   r="2.3" fill="#a78bfa"/>
  <circle cx="10.5" cy="25.5" r="2.3" fill="#fbbf24"/>
  <circle cx="21.5" cy="25.5" r="2.3" fill="#2dd4bf"/>

  <!-- Centre hub -->
  <circle cx="16" cy="16" r="3.8" fill="#f1f5f9"/>
</svg>
